<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龍神宮 - 管理画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 表示切替ボタン -->
    <div class="view-toggle">
        <button id="viewToggleBtn" onclick="toggleView()">
            <span class="mobile-icon">📱</span>
            <span class="pc-icon">💻</span>
            <span class="toggle-text">PC表示</span>
        </button>
    </div>

    <header>
        <h1>龍神宮 管理画面</h1>
    </header>

    <main class="admin-container">
        <!-- ログイン画面 -->
        <section id="loginSection" class="login-form" style="display: none;">
            <h2>管理者ログイン</h2>
            <div id="loginError" class="error"></div>
            <form onsubmit="event.preventDefault(); login();">
                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">ログイン</button>
            </form>
            <p style="margin-top:1rem;text-align:center;">
                <a href="index.html" style="color:#0077b6;">← サイトに戻る</a>
            </p>
        </section>

        <!-- 管理画面 -->
        <section id="adminSection" style="display: none;">
            <div class="admin-header">
                <h2>商品管理</h2>
                <p>登録・管理コード: dkorede</p>
                <div style="margin-top:1rem;display:flex;gap:1rem;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="showProductForm()">新規商品追加</button>
                    <button class="btn btn-secondary" onclick="showSettings()">各種設定</button>
                    <button class="btn btn-secondary" onclick="logout()">ログアウト</button>
                    <a href="index.html" class="btn" style="background:#0077b6;color:white;text-decoration:none;">サイトを表示</a>
                </div>
            </div>
            
            <div id="message"></div>

            <!-- 設定セクション -->
            <section id="settingsSection" class="settings-section" style="display: none;">
                <h3>SNS・スプレッドシート設定</h3>
                <form onsubmit="event.preventDefault(); saveSettingsHandler();">
                    <div class="form-group">
                        <label for="lineUrl">LINE公式アカウントURL</label>
                        <input type="text" id="lineUrl" placeholder="https://line.me/ja/..." required>
                    </div>
                    <div class="form-group">
                        <label for="instagramFortune">占い用Instagram URL</label>
                        <input type="text" id="instagramFortune" placeholder="https://instagram.com/...">
                    </div>
                    <div class="form-group">
                        <label for="instagramBracelet">ブレスレット用Instagram URL</label>
                        <input type="text" id="instagramBracelet" placeholder="https://instagram.com/...">
                    </div>
                    <hr style="margin:1.5rem 0;border:none;border-top:1px solid #90e0ef;">
                    <div class="form-group">
                        <label for="spreadsheetUrl">Google Sheets / GAS URL</label>
                        <input type="text" id="spreadsheetUrl" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv">
                        <div style="margin-top:0.5rem;font-size:0.85rem;color:#666;">
                            <p><strong>方法1:</strong> ファイル > ウェブに公開 > 「ウェブに公開」> URLを入力</p>
                            <p><strong>方法2:</strong> CORSエラーが出る場合はGoogle Apps Scriptを使用</p>
                        </div>
                        <div style="margin-top:0.5rem;">
                            <button type="button" class="btn btn-secondary" style="font-size:0.8rem;padding:0.4rem 0.8rem;" onclick="showGasSetup()">GASの作り方を見る</button>
                        </div>
                        <div id="syncInfo" style="margin-top:0.5rem;"></div>
                    </div>
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                        <button type="submit" class="btn btn-primary">設定を保存</button>
                        <button type="button" class="btn btn-secondary" onclick="syncFromSpreadsheetHandler()">今すぐ同期</button>
                        <button type="button" class="btn btn-secondary" style="background:#e9a819;" onclick="showDebugInfo()">🔍 同期デバッグ</button>
                        <button type="button" class="btn btn-danger" onclick="disableSpreadsheetHandler()">スプレッドシート連携を解除</button>
                        <button type="button" class="btn btn-secondary" onclick="hideSettings()">キャンセル</button>
                    </div>
                </form>
            </section>

            <!-- 商品リスト -->
            <section id="adminProductListSection">
                <div id="adminProductList" class="admin-product-list">
                </div>
            </section>

            <!-- 商品追加・編集フォーム -->
            <section id="productFormSection" class="product-form" style="display: none;">
                <h3 id="formTitle">商品を追加</h3>
                <form onsubmit="event.preventDefault(); saveProduct();">
                    <input type="hidden" id="productId">
                    <div class="form-group">
                        <label for="productName">商品名</label>
                        <input type="text" id="productName" required>
                    </div>
                    <div class="form-group">
                        <label for="productTagline">キャッチコピー</label>
                        <input type="text" id="productTagline" required>
                    </div>
                    <div class="form-group">
                        <label for="productDescription">紹介文</label>
                        <textarea id="productDescription" rows="4" required></textarea>
                        <div class="hashtag-guide">
                            <p>▼フィルター用ハッシュタグ（紹介文に含めてください）</p>
                            <div class="hashtag-tags">
                                <span>五行: ＃木 ＃火 ＃土 ＃金 ＃水</span>
                                <span>運: ＃金運強め ＃恋愛運強め ＃浄化強め ＃抑制強め</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="productSize">サイズ</label>
                        <input type="text" id="productSize" required>
                    </div>
                    <div class="form-group">
                        <label for="productPrice">金額</label>
                        <input type="text" id="productPrice" required>
                    </div>
                    
                    <div style="margin:1.5rem 0;padding:1rem;background:#f0f9ff;border-radius:10px;">
                        <h4 style="color:#023e8a;margin-bottom:1rem;">商品画像（5枚まで）</h4>
                        <div id="imageInputsContainer">
                        </div>
                    </div>
                    
                    <div style="display:flex;gap:1rem;">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-secondary" onclick="hideProductForm()">キャンセル</button>
                    </div>
                </form>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
